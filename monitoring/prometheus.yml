# NEXUS Prometheus 配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# =============================================================================
# 告警规则文件
# =============================================================================
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# =============================================================================
# Alertmanager 配置
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

scrape_configs:
  - job_name: 'nexus-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'nexus-worker'
    static_configs:
      - targets: ['worker:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager 自身监控
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
