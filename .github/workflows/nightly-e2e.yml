name: Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:  # allow manual trigger

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test_pw
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      api:
        image: nexus-api:ci
        build:
          context: .
          dockerfile: Dockerfile
          target: production
        env:
          ENVIRONMENT: test
          DEBUG: "false"
          DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@postgres:5432/nexus_test
          REDIS_URL: redis://redis:6379/0
          SECRET_KEY: test-secret-key-for-e2e-only-32-chars-min
          JWT_SECRET_KEY: test-jwt-secret-key-for-e2e-32-chars-min
          DEV_API_KEY: test_dev_key_for_e2e_only
          LITELLM_PROXY_URL: ""
        ports:
          - 8765:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        depends_on:
          postgres:
            condition: service_healthy
          redis:
            condition: service_healthy

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@localhost:5432/nexus_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key-for-e2e-only-32-chars-min
      JWT_SECRET_KEY: test-jwt-secret-key-for-e2e-32-chars-min
      DEV_API_KEY: test_dev_key_for_e2e_only
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8765/health > /dev/null 2>&1; then
              echo "API is up"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 1
          done
          curl -sf http://localhost:8765/health || (echo "API never came up" && exit 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run E2E tests
        # Override pytest.ini addopts to drop the -m "not slow and not integration" filter,
        # otherwise the @pytest.mark.integration E2E tests would be silently skipped.
        run: |
          pytest tests/test_e2e_integration.py -v --tb=short -x --override-ini="addopts=-v --tb=short"
