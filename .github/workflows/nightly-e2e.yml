name: Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:  # allow manual trigger

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test_pw
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@localhost:5432/nexus_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      SECRET_KEY: ci-test-secret-key-change-me-123456
      DEV_API_KEY: test-api-key
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run E2E tests
        run: |
          pytest tests/test_e2e_integration.py -v --tb=short -x

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs
          path: |
            test-results/
            *.log
