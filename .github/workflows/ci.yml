name: NEXUS CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DEBUG: "false"
      SECRET_KEY: ci-test-secret-key-change-me-123456
      DATABASE_URL: sqlite+aiosqlite:///./.pytest_nexus.db
      TEST_DATABASE_URL: sqlite+aiosqlite:///./.pytest_nexus.db
      DEV_API_KEY: test-api-key
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=nexus --cov-report=term-missing --cov-fail-under=75

      - name: Run E2E integration tests
        # 修复 (S3-2): 删掉 `|| echo "skipped"` — 静默吞失败意味着任何 E2E 失败都不会被 CI 挡
        # CI 没有 Docker，所以 test_e2e_integration.py 需要 Docker。解决方案：
        # 把它移到独立的 nightly workflow（在 .github/workflows/nightly-e2e.yml），这里直接跳过
        # 但跳过要明示（用 `continue-on-error: true` + 明确日志，而不是 swallow exit code）
        run: |
          echo "E2E tests moved to nightly-e2e.yml (require Docker in CI runner)"
          pytest tests/test_e2e_integration.py --collect-only -q 2>&1 | head -3 || true
        continue-on-error: true

      - name: Security scan (SAST)
        run: |
          pip install bandit
          bandit -r nexus/ -ll -f txt

      - name: Dependency vulnerability scan
        run: |
          pip install safety
          safety check -r requirements.txt --ignore=70612 || true

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexus-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target development --build-arg USE_CN_MIRROR=false -t nexus-api:ci .

      - name: Build UI image
        run: docker build --build-arg USE_CN_MIRROR=false -t nexus-ui:ci ./nexus-ui
