name: NEXUS CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DEBUG: "false"
      SECRET_KEY: ci-test-secret-key-change-me-123456
      DATABASE_URL: sqlite+aiosqlite:///./.pytest_nexus.db
      TEST_DATABASE_URL: sqlite+aiosqlite:///./.pytest_nexus.db
      DEV_API_KEY: test-api-key
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend regression tests
        run: pytest tests/test_dependency_files.py tests/test_dependency_warnings.py tests/test_builder.py tests/test_workflow_engine.py tests/test_services.py tests/test_api.py tests/test_jobs.py -q

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexus-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target development --build-arg USE_CN_MIRROR=false -t nexus-api:ci .

      - name: Build UI image
        run: docker build --build-arg USE_CN_MIRROR=false -t nexus-ui:ci ./nexus-ui
