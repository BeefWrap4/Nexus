name: NEXUS CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DEBUG: "false"
      SECRET_KEY: ci-test-secret-key-change-me-1234567890ab
      JWT_SECRET_KEY: ci-test-jwt-secret-change-me-1234567890ab
      DATABASE_URL: sqlite+aiosqlite:///./.pytest_nexus.db
      TEST_DATABASE_URL: sqlite+aiosqlite:///./.pytest_nexus.db
      DEV_API_KEY: test-api-key
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=nexus --cov-report=term-missing --cov-fail-under=75

      - name: Security scan (SAST)
        run: |
          pip install bandit
          bandit -r nexus/ -ll -f txt

      - name: Dependency vulnerability scan
        run: |
          pip install safety
          safety check -r requirements.txt --ignore=70612 || true

  rls-behavioral:
    # Phase 3.7: run the cross-tenant RLS behavioral test against a real
    # PostgreSQL. The main `backend` job uses SQLite (fast, hermetic) but
    # `tests/test_db_rls_behavioral.py` skips on SQLite — RLS is PG-only.
    # This job spins up PG, applies migrations (which create the nexus_app
    # role + RLS policies via add_row_level_security.py), then runs the
    # behavioral test which connects as nexus_app (NOSUPERUSER) and
    # asserts cross-tenant SELECT returns 0 rows and cross-tenant INSERT
    # is blocked by the WITH CHECK clause.
    name: RLS behavioral test (PG)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test_pw
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: test
      DEBUG: "false"
      SECRET_KEY: ci-test-secret-key-change-me-1234567890ab
      JWT_SECRET_KEY: ci-test-jwt-secret-change-me-1234567890ab
      # Test runner connects as the PG superuser (nexus) for migrations;
      # the test itself swaps to nexus_app via _swap_user_to_nexus_app().
      DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@localhost:5432/nexus_test
      TEST_DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@localhost:5432/nexus_test
      MIGRATION_DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@localhost:5432/nexus_test
      NEXUS_APP_DB_PASSWORD: ci_rls_nexus_app_pw
      REDIS_URL: redis://localhost:6379/0
      DEV_API_KEY: test-api-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        # Applies all migrations including add_row_level_security.py,
        # which creates the nexus_app role + RLS policies on multi-
        # tenant tables. Migrations run as the PG superuser because
        # CREATE ROLE requires privileges nexus_app does not have.
        run: |
          alembic upgrade head

      - name: Run RLS behavioral test
        # The test file's pytestmark skips on SQLite. With TEST_DATABASE_URL
        # pointing at PG, it connects as nexus_app and asserts:
        # 1. Cross-tenant SELECT returns 0 rows
        # 2. Cross-tenant INSERT is blocked by WITH CHECK
        # 3. Connected role is NOT a superuser
        run: |
          pytest tests/test_db_rls_behavioral.py -v --tb=short

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexus-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  e2e-smoke:
    name: E2E smoke (health check)
    runs-on: ubuntu-latest
    # Light-touch PR check: spin up postgres + redis + the API as service
    # containers and run the cheapest E2E test (test_01_health_check) to
    # confirm the API actually boots in CI. The full E2E matrix runs
    # nightly via nightly-e2e.yml.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test_pw
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      api:
        image: nexus-api:ci
        build:
          context: .
          dockerfile: Dockerfile
          target: production
        env:
          ENVIRONMENT: test
          DEBUG: "false"
          DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@postgres:5432/nexus_test
          REDIS_URL: redis://redis:6379/0
          SECRET_KEY: test-secret-key-for-e2e-only-32-chars-min
          JWT_SECRET_KEY: test-jwt-secret-key-for-e2e-32-chars-min
          DEV_API_KEY: test_dev_key_for_e2e_only
          LITELLM_PROXY_URL: ""
        ports:
          - 8765:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        depends_on:
          postgres:
            condition: service_healthy
          redis:
            condition: service_healthy

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://nexus:nexus_test_pw@localhost:5432/nexus_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key-for-e2e-only-32-chars-min
      JWT_SECRET_KEY: test-jwt-secret-key-for-e2e-32-chars-min
      DEV_API_KEY: test_dev_key_for_e2e_only
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8765/health > /dev/null 2>&1; then
              echo "API is up"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 1
          done
          curl -sf http://localhost:8765/health || (echo "API never came up" && exit 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx

      - name: Run E2E smoke
        # Override pytest.ini addopts to drop the -m "not slow and not integration" filter,
        # otherwise the @pytest.mark.integration E2E tests would be silently skipped.
        run: |
          pytest tests/test_e2e_integration.py -v --tb=short \
            -k "test_01_health_check" \
            --override-ini="addopts=-v --tb=short"

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target development --build-arg USE_CN_MIRROR=false -t nexus-api:ci .

      - name: Build UI image
        run: docker build --build-arg USE_CN_MIRROR=false -t nexus-ui:ci ./nexus-ui

      - name: Verify production image has no --reload
        run: |
          echo "Building production image to verify..."
          docker build --target production --build-arg USE_CN_MIRROR=false -t nexus-prod-check .
          # Get the CMD; fail if --reload is present
          CMD=$(docker inspect nexus-prod-check --format '{{.Config.Cmd}}')
          echo "Production image CMD: $CMD"
          if echo "$CMD" | grep -q -- "--reload"; then
            echo "FATAL: production image contains --reload flag"
            echo "The dev image is being shipped as production!"
            exit 1
          fi
          echo "OK: production image has no --reload flag"
