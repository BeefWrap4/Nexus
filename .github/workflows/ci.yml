# =============================================================================
# NEXUS CI/CD Pipeline
# 规范: push/PR → lint → test → build → push → deploy
# 触发: push/PR to main 分支
# =============================================================================

name: NEXUS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_UI: ${{ github.repository }}/ui

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check nexus/ tests/ --ignore=F401,E501

  # ---------------------------------------------------------------------------
  # Test — pytest with Redis service
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    needs: lint
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest tests/ -v --ignore=tests/test_workflow_engine.py
        env:
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          DEBUG: false
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite+aiosqlite:///./test.db

  # ---------------------------------------------------------------------------
  # Build & Push API Image — Docker multi-stage (production target)
  # ---------------------------------------------------------------------------
  build-api:
    name: Build API Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ github.sha }}
          build-args: |
            USE_CN_MIRROR=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Build & Push UI Image — Vue + nginx
  # ---------------------------------------------------------------------------
  build-ui:
    name: Build UI Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build UI image
        uses: docker/build-push-action@v5
        with:
          context: ./nexus-ui
          file: ./nexus-ui/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_UI }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_UI }}:${{ github.sha }}
          build-args: |
            USE_CN_MIRROR=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — 通过 SSH 触发远程服务器部署（可选）
  # 需要配置 DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY 等 secrets
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build-api, build-ui]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # permissions 需要 packages:read 以拉取镜像
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "🚀 Deploying NEXUS..."
            cd /opt/nexus || exit 1
            git pull origin main
            bash scripts/deploy.sh --full
            echo "✅ Deployment triggered"
