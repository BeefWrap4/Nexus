# Redis Sentinel Configuration
# =============================================================================
# 哨兵监控配置
# 修复 (S1-2): 哨兵认证密码从 REDIS_PASSWORD 环境变量替换，
# 避免硬编码 PdcEPoGbOEcG5tkEryvkaffFCgTc30Ym（已公开在 git 历史中）
# =============================================================================

# 监控主节点
sentinel monitor mymaster nexus-redis-master 6379 2

# 主节点判定为客观下线的超时时间(毫秒)
sentinel down-after-milliseconds mymaster 5000

# 故障转移超时时间(毫秒)
sentinel failover-timeout mymaster 60000

# 并行同步的从节点数量
sentinel parallel-syncs mymaster 1

# 认证密码(与Redis主节点一致) — 修复 (S1-2)：从 REDIS_PASSWORD 替换
# entrypoint.sh 会在启动前用 sed 把 __REDIS_PASSWORD__ 替换为实际值
sentinel auth-pass mymaster __REDIS_PASSWORD__

# 日志配置
# 容器环境中使用stdout输出日志
logfile ""
loglevel notice

# 工作目录
dir /tmp

# 保护模式关闭(容器环境)
protected-mode no

# 端口
port 26379
