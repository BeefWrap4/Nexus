# =============================================================================
# NEXUS - Enterprise Multi-Agent Orchestration Engine
# Docker Compose 完整部署配置
# =============================================================================
#
# 国内源加速配置指南
# ---------------------------------------------------------------------------
# 1. Docker Hub 镜像加速器（宿主机全局配置）
#    复制 .docker/daemon.json.example 到 /etc/docker/daemon.json，然后重启 Docker:
#    $ sudo systemctl restart docker
#
# 2. 构建时关闭国内源（海外部署时使用）
#    $ USE_CN_MIRROR=false docker compose build
#    或在 .env 文件中设置 USE_CN_MIRROR=false
#
# 3. 各服务源映射
#    ┌──────────────┬────────────────────────────────────────────────┐
#    │ 服务          │ 国内源                                         │
#    ├──────────────┼────────────────────────────────────────────────┤
#    │ pip (backend)│ mirrors.aliyun.com/pypi/simple/               │
#    │ apt (backend)│ mirrors.aliyun.com (Debian)                   │
#    │ npm (ui)     │ registry.npmmirror.com (淘宝 npm)             │
#    │ apk (ui)     │ mirrors.aliyun.com (Alpine)                   │
#    │ postgres     │ docker.mirrors.sjtug.sjtu.edu.cn (镜像加速)   │
#    │ redis        │ docker.mirrors.sjtug.sjtu.edu.cn (镜像加速)   │
#    │ minio        │ docker.mirrors.sjtug.sjtu.edu.cn (镜像加速)   │
#    │ litellm      │ docker.mirrors.sjtug.sjtu.edu.cn (镜像加速)   │
#    │ prometheus   │ docker.mirrors.sjtug.sjtu.edu.cn (镜像加速)   │
#    │ grafana      │ docker.mirrors.sjtug.sjtu.edu.cn (镜像加速)   │
#    └──────────────┴────────────────────────────────────────────────┘

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Primary)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe@2026!Secure}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      PGDATA: /var/lib/postgresql/data/pgdata
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-ReplicaPass@2026!Secure}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./scripts/init_db.py:/docker-entrypoint-initdb.d/01_init_db.py:ro
      - ./scripts/init_replication.sh:/docker-entrypoint-initdb.d/02_init_replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # PostgreSQL Replica
  # ---------------------------------------------------------------------------
  postgres-replica:
    image: postgres:16-alpine
    container_name: nexus-postgres-replica
    restart: unless-stopped
    environment:
      PGUSER: ${POSTGRES_USER:-nexus}
      PGPASSWORD: ${POSTGRES_PASSWORD:-ChangeMe@2026!Secure}
      PRIMARY_HOST: nexus-postgres-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-ReplicaPass@2026!Secure}
    ports:
      - "${POSTGRES_REPLICA_PORT:-5434}:5432"
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    command:
      - /bin/bash
      - -c
      - |
        until pg_basebackup -h $${PRIMARY_HOST} -p $${PRIMARY_PORT} -U $${REPLICATION_USER} -D /var/lib/postgresql/data -Fp -Xs -P -R; do
          echo 'Waiting for primary to be ready...'
          sleep 2
        done
        exec docker-entrypoint.sh postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # Redis Master (Sentinel Mode)
  # ---------------------------------------------------------------------------
  redis-master:
    image: redis:7-alpine
    container_name: nexus-redis-master
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --stop-writes-on-bgsave-error no
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_MASTER_PORT:-6380}:6379"
    volumes:
      - redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # Redis Replica 1
  # ---------------------------------------------------------------------------
  redis-replica-1:
    image: redis:7-alpine
    container_name: nexus-redis-replica-1
    restart: unless-stopped
    command: >
      redis-server
      --replicaof nexus-redis-master 6379
      --masterauth ${REDIS_PASSWORD:-}
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_REPLICA1_PORT:-6381}:6379"
    volumes:
      - redis-replica-1-data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # Redis Replica 2
  # ---------------------------------------------------------------------------
  redis-replica-2:
    image: redis:7-alpine
    container_name: nexus-redis-replica-2
    restart: unless-stopped
    command: >
      redis-server
      --replicaof nexus-redis-master 6379
      --masterauth ${REDIS_PASSWORD:-}
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_REPLICA2_PORT:-6382}:6379"
    volumes:
      - redis-replica-2-data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # Redis Sentinel 1
  # ---------------------------------------------------------------------------
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: nexus-redis-sentinel-1
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/etc/redis/sentinel-entrypoint.sh"]
    ports:
      - "${SENTINEL1_PORT:-26379}:26379"
    volumes:
      - ./configs/redis-sentinel.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./configs/redis-sentinel-entrypoint.sh:/usr/local/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # Redis Sentinel 2
  # ---------------------------------------------------------------------------
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: nexus-redis-sentinel-2
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/etc/redis/sentinel-entrypoint.sh"]
    ports:
      - "${SENTINEL2_PORT:-26380}:26379"
    volumes:
      - ./configs/redis-sentinel.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./configs/redis-sentinel-entrypoint.sh:/usr/local/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # Redis Sentinel 3
  # ---------------------------------------------------------------------------
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: nexus-redis-sentinel-3
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/etc/redis/sentinel-entrypoint.sh"]
    ports:
      - "${SENTINEL3_PORT:-26381}:26379"
    volumes:
      - ./configs/redis-sentinel.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./configs/redis-sentinel-entrypoint.sh:/usr/local/etc/redis/sentinel-entrypoint.sh:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # MinIO (Object Storage for Artifacts)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexus-secret-key}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # MinIO Bucket Init (one-shot)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: nexus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexus-secret-key}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb local/${S3_BUCKET:-nexus-artifacts} --ignore-existing &&
        mc anonymous set download local/${S3_BUCKET:-nexus-artifacts} || true
      "
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # LiteLLM Proxy (LLM Gateway)
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: nexus-litellm
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # NEXUS Backend API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_BUILD_TARGET:-development}
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    container_name: nexus-api
    restart: unless-stopped
    environment:
      # 基础配置
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEV_API_KEY: ${DEV_API_KEY:-nexus_devkey_api_key_for_testing_and_docs}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # 数据库
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}

      # Redis (P2高可用架构 - 哨兵模式)
      REDIS_SENTINEL_HOSTS: nexus-redis-sentinel-1:26379,nexus-redis-sentinel-2:26380,nexus-redis-sentinel-3:26381
      REDIS_SENTINEL_MASTER: mymaster
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # LLM Gateway
      LITELLM_PROXY_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}

      # LLM配置
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-4o}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      DEFAULT_LLM_TIMEOUT: ${DEFAULT_LLM_TIMEOUT:-120}
      DEFAULT_LLM_MAX_TOKENS: ${DEFAULT_LLM_MAX_TOKENS:-4000}
      DEFAULT_LLM_TEMPERATURE: ${DEFAULT_LLM_TEMPERATURE:-0.7}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
      LLM_MAX_CONCURRENT_CALLS: ${LLM_MAX_CONCURRENT_CALLS:-10}

      # 存储
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-nexus}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-nexus-secret-key}
      S3_BUCKET: ${S3_BUCKET:-nexus-artifacts}

      # 可观测性
      ENABLE_PROMETHEUS: ${ENABLE_PROMETHEUS:-true}
      ENABLE_OPENTELEMETRY: ${ENABLE_OPENTELEMETRY:-false}

      # Agent配置
      AGENT_MEMORY_ENABLED: ${AGENT_MEMORY_ENABLED:-true}
      AGENT_MEMORY_MAX_TOKENS: ${AGENT_MEMORY_MAX_TOKENS:-8000}

      # 引擎配置
      MAX_WORKFLOW_STEPS: ${MAX_WORKFLOW_STEPS:-500}
      WORKFLOW_TIMEOUT_SECONDS: ${WORKFLOW_TIMEOUT_SECONDS:-3600}
      DEFAULT_CHECKPOINT_INTERVAL: ${DEFAULT_CHECKPOINT_INTERVAL:-1}

      # HITL配置
      DEFAULT_HITL_TIMEOUT_SECONDS: ${DEFAULT_HITL_TIMEOUT_SECONDS:-86400}
    ports:
      - "${API_PORT:-8765}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      litellm:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./nexus:/app/nexus:ro
      - ./tests:/app/tests:ro
      - nexus-logs:/app/logs
      - nexus-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # ARQ Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_BUILD_TARGET:-development}
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      # Redis (P2高可用架构 - 哨兵模式)
      REDIS_SENTINEL_HOSTS: nexus-redis-sentinel-1:26379,nexus-redis-sentinel-2:26380,nexus-redis-sentinel-3:26381
      REDIS_SENTINEL_MASTER: mymaster
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LITELLM_PROXY_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-nexus}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-nexus-secret-key}
      S3_BUCKET: ${S3_BUCKET:-nexus-artifacts}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-4o}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
      LLM_MAX_CONCURRENT_CALLS: ${LLM_MAX_CONCURRENT_CALLS:-10}
      MAX_WORKFLOW_STEPS: ${MAX_WORKFLOW_STEPS:-500}
      WORKFLOW_TIMEOUT_SECONDS: ${WORKFLOW_TIMEOUT_SECONDS:-3600}
      ARQ_WORKER_CONCURRENCY: ${ARQ_WORKER_CONCURRENCY:-10}
      ARQ_JOB_TIMEOUT: ${ARQ_JOB_TIMEOUT:-3600}
      ARQ_MAX_RETRIES: ${ARQ_MAX_RETRIES:-3}
    # Worker metrics accessible via Docker network (replicas share no host port)
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from nexus.cache.redis_client import get_redis_client; r=get_redis_client(); r.ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      litellm:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - ./nexus:/app/nexus:ro
      - nexus-logs:/app/logs
    command: arq nexus.jobs.config.WorkerSettings
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - nexus-network

  # ---------------------------------------------------------------------------
  # NEXUS Frontend (Production: nginx serve static files)
  # ---------------------------------------------------------------------------
  ui:
    build:
      context: ./nexus-ui
      dockerfile: Dockerfile
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    container_name: nexus-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nexus-network
    profiles:
      - prod-ui

  # ---------------------------------------------------------------------------
  # NEXUS Frontend (Development: Vite hot-reload)
  # ---------------------------------------------------------------------------
  dev-ui:
    build:
      context: ./nexus-ui
      dockerfile: Dockerfile.dev
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    container_name: nexus-dev-ui
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8765}
      VITE_WS_URL: ws://localhost:${API_PORT:-8765}
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./nexus-ui:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - nexus-network
    profiles:
      - dev-ui

  # ---------------------------------------------------------------------------
  # Smart Cache (LLM Cache Engine) — RAG profile
  # ---------------------------------------------------------------------------
  smart-cache:
    image: ghcr.io/beefwrap/llm-cache-engine:latest
    container_name: nexus-smart-cache
    restart: unless-stopped
    ports:
      - "${SMART_CACHE_PORT:-8777}:8777"
    environment:
      REDIS_URL: redis://redis-master:6379/1
      EMBEDDING_MODEL: ${SMART_CACHE_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      API_KEY: ${SMART_CACHE_API_KEY:-}
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - nexus-network
    profiles:
      - rag

  # ---------------------------------------------------------------------------
  # Prometheus (Metrics)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - nexus-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Alertmanager (Alert Routing & Notification)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:latest
    container_name: nexus-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      - prometheus
    networks:
      - nexus-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # DingTalk Webhook Adapter (Alert Notification Bridge)
  # ---------------------------------------------------------------------------
  dingtalk-webhook:
    image: timonius/dingtalk-webhook:latest
    container_name: nexus-dingtalk-webhook
    restart: unless-stopped
    environment:
      # 钉钉机器人Webhook URL（需要替换为实际的access_token）
      DINGTALK_WEBHOOK_URL_1: ${DINGTALK_WEBHOOK_URL_1:-https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_1}
      DINGTALK_WEBHOOK_URL_2: ${DINGTALK_WEBHOOK_URL_2:-https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_2}
      DINGTALK_WEBHOOK_URL_3: ${DINGTALK_WEBHOOK_URL_3:-https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_3}
      DINGTALK_WEBHOOK_URL_4: ${DINGTALK_WEBHOOK_URL_4:-https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_4}
    ports:
      - "8060:8060"
    depends_on:
      - alertmanager
    networks:
      - nexus-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana (Dashboards)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - nexus-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Loki (Log Aggregation)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9
    container_name: nexus-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - nexus-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Node Exporter (Host Metrics)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: nexus-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - nexus-network
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # PostgreSQL Exporter (pg pool / replication metrics)
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nexus-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Redis Exporter (keyspace / hit rate / memory)
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: nexus-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis-master:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    ports:
      - "9121:9121"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - nexus-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-primary-data:
    driver: local
  postgres-replica-data:
    driver: local
  redis-master-data:
    driver: local
  redis-replica-1-data:
    driver: local
  redis-replica-2-data:
    driver: local
  minio-data:
    driver: local
  nexus-logs:
    driver: local
  nexus-data:
    driver: local
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  nexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
