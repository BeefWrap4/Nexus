# =============================================================================
# NEXUS UI - nginx Configuration
# Production static file serving + API reverse proxy
# =============================================================================

# P0 (Task 1.6) Edge DoS protection.
# Pre-auth rate limit on /health and /metrics — these public paths are
# fully reachable without auth, so the API-level anonymous_rate_limit
# middleware is the only barrier. nginx rate-limiting at the edge gives
# us a second layer of defense (and sheds load before reaching the
# uvicorn workers). $binary_remote_addr is the per-client key.
limit_req_zone $binary_remote_addr zone=health_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=metrics_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API reverse proxy
    # Edge rate limit on /api/ — second layer of DoS defense (first is
    # the FastAPI anonymous_rate_limit_middleware in the API process).
    location /api/ {
        limit_req zone=api_limit burst=120 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # WebSocket proxy (for run monitoring)
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # Long-lived WebSocket connection
    }

    # Health check endpoint (pass-through to API)
    # Edge rate limit (10r/s sustained, 20 burst) — prevents a tight
    # loop from saturating the upstream /health handler.
    location /health {
        limit_req zone=health_limit burst=20 nodelay;
        proxy_pass http://api:8000;
    }

    # Metrics endpoint (pass-through to API)
    # Edge rate limit (5r/s sustained, 10 burst) — scrapers should
    # poll at <1Hz; this is plenty for Prometheus / 30s intervals.
    location /metrics {
        limit_req zone=metrics_limit burst=10 nodelay;
        proxy_pass http://api:8000;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
